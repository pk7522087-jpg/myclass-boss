<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>魔王大決戰</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    input[type=number]::-webkit-inner-spin-button, input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    @keyframes spin-slow { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    .animate-spin-slow { animation: spin-slow 12s linear infinite; transform-origin: center; }
    .scrollbar-hide::-webkit-scrollbar { display: none; }
    .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
    
    @keyframes float-boss {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
    }
    .animate-float-boss-0 { animation: float-boss 3.2s ease-in-out infinite; }
    .animate-float-boss-1 { animation: float-boss 4.5s ease-in-out infinite; }
    .animate-float-boss-2 { animation: float-boss 3.8s ease-in-out infinite; }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-5px) rotate(-1deg); }
      50% { transform: translateX(5px) rotate(1deg); }
      75% { transform: translateX(-5px) rotate(-1deg); }
    }
    .animate-shake { animation: shake 0.3s cubic-bezier(.36,.07,.19,.97) both; will-change: transform; }
    
    @keyframes bounce-custom {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-15px); }
    }
    .animate-bounce-custom { animation: bounce-custom 0.5s ease-in-out 3; will-change: transform; }

    @keyframes float-up {
       0% { opacity: 1; transform: translateY(0) scale(0.8); }
       20% { opacity: 1; transform: translateY(-15px) scale(1.1); }
       100% { opacity: 0; transform: translateY(-40px) scale(1.3); }
    }
    .animate-float-up { animation: float-up 1.2s forwards ease-out; }
    
    @keyframes shimmer {
      100% { transform: translateX(100%); }
    }

    .fade-in { animation: fadeIn 0.3s ease-out forwards; }
    @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
  </style>
</head>
<body class="h-[100dvh] bg-[#050508] bg-[radial-gradient(ellipse_at_top,_var(--tw-gradient-stops))] from-indigo-900/20 via-[#050508] to-[#050508] text-slate-100 p-2 md:p-4 pt-5 md:pt-6 font-sans overflow-hidden flex flex-col relative m-0">

  <!-- 背景音樂播放器 (史詩魔王決戰配樂) -->
  <audio id="bgmAudio" src="https://assets.mixkit.co/music/preview/mixkit-choir-of-doom-epic-trailer-2615.mp3" loop preload="auto"></audio>

  <!-- 特效與遮罩層 -->
  <div id="selfishOverlay" class="fixed inset-0 pointer-events-none z-50 transition-colors duration-200 bg-transparent"></div>
  
  <!-- 命運骰子 Modal -->
  <div id="diceModal" class="fixed inset-0 z-[120] flex items-center justify-center p-4 bg-black/80 backdrop-blur-md hidden fade-in"></div>

  <!-- 英雄技能視窗 Modal -->
  <div id="heroModal" class="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-black/80 backdrop-blur-md hidden fade-in" onclick="closeHeroModal()"></div>

  <div class="max-w-7xl mx-auto w-full h-full flex flex-col">
    <!-- Header -->
    <header class="flex flex-col items-center mb-4 shrink-0 relative z-40">
      
      <!-- 音樂控制區塊 -->
      <div class="absolute right-0 top-0 md:right-4 md:top-2 flex gap-2">
        <label class="cursor-pointer flex items-center gap-1 px-3 py-1.5 rounded-full font-black text-xs transition-all border bg-slate-800/80 text-slate-300 border-slate-600 shadow-inner hover:bg-slate-700 z-50">
           <span>📁 自訂音樂</span>
           <input type="file" id="bgmUpload" accept="audio/*" class="hidden" onchange="handleBgmUpload(event)" />
        </label>
        
        <button id="bgmBtn" onclick="toggleBGM()" class="flex items-center gap-2 px-3 py-1.5 rounded-full font-black text-xs transition-all border bg-red-500/20 text-red-300 border-red-400/50 animate-pulse shadow-[0_0_10px_rgba(239,68,68,0.5)] z-50">
          <span id="bgmBtnText">🔈 啟動音樂</span>
        </button>
      </div>

      <h1 class="text-3xl md:text-4xl font-black text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 via-fuchsia-400 to-purple-500 tracking-tighter italic drop-shadow-[0_0_15px_rgba(217,70,239,0.3)] mb-4 pb-1 leading-tight mt-8 md:mt-0">
        魔王大決戰
      </h1>
      
      <div id="tabsContainer" class="flex bg-black/40 p-1.5 rounded-2xl border border-white/10 backdrop-blur-xl shadow-2xl w-full max-w-4xl justify-between overflow-x-auto scrollbar-hide ring-1 ring-white/5">
        <!-- Tabs generated by JS -->
      </div>
    </header>

    <!-- Main Content Area -->
    <main class="flex-1 overflow-hidden relative z-10" id="mainContent">
      <div id="view-battle" class="h-full hidden flex flex-col gap-4 relative fade-in overflow-y-auto pb-24 scrollbar-hide px-1"></div>
      <div id="view-skills" class="h-full hidden flex flex-col overflow-y-auto pb-24 fade-in px-1"></div>
      <div id="view-quests" class="h-full hidden flex flex-col overflow-y-auto items-center justify-center p-4 fade-in pb-24"></div>
      <div id="view-log" class="h-full hidden flex flex-col bg-slate-900/60 rounded-[2rem] border border-white/10 backdrop-blur-xl shadow-2xl overflow-hidden w-full max-w-4xl mx-auto fade-in"></div>
      <div id="view-leaderboard" class="h-full hidden flex flex-col overflow-y-auto pb-24 fade-in px-1"></div>
      <div id="view-studio" class="h-full hidden flex flex-col overflow-y-auto items-center p-2 md:p-4 scrollbar-hide gap-6 pb-24 fade-in"></div>
    </main>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getFirestore, doc, onSnapshot, setDoc, updateDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
    import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

    // --- 音效引擎 (SFX Engine) ---
    window.playSFX = (type) => {
      try {
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        if (!AudioContext) return;
        const ctx = new AudioContext();

        if (type === 'hit') {
          const osc = ctx.createOscillator(); const gain = ctx.createGain();
          osc.type = 'square'; osc.frequency.setValueAtTime(150, ctx.currentTime);
          osc.frequency.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.15);
          gain.gain.setValueAtTime(0.2, ctx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.15);
          osc.connect(gain); gain.connect(ctx.destination);
          osc.start(); osc.stop(ctx.currentTime + 0.15);
        } else if (type === 'levelup') {
          const notes = [523.25, 659.25, 783.99, 1046.50];
          notes.forEach((freq, i) => {
            const osc = ctx.createOscillator(); const gain = ctx.createGain();
            osc.type = 'sine'; osc.frequency.value = freq;
            gain.gain.setValueAtTime(0, ctx.currentTime + i * 0.1);
            gain.gain.linearRampToValueAtTime(0.2, ctx.currentTime + i * 0.1 + 0.05);
            gain.gain.linearRampToValueAtTime(0, ctx.currentTime + i * 0.1 + 0.1);
            osc.connect(gain); gain.connect(ctx.destination);
            osc.start(ctx.currentTime + i * 0.1); osc.stop(ctx.currentTime + i * 0.1 + 0.1);
          });
        } else if (type === 'alert') {
          const osc = ctx.createOscillator(); const gain = ctx.createGain();
          osc.type = 'sawtooth'; osc.frequency.setValueAtTime(400, ctx.currentTime);
          osc.frequency.linearRampToValueAtTime(600, ctx.currentTime + 0.15);
          osc.frequency.linearRampToValueAtTime(400, ctx.currentTime + 0.3);
          osc.frequency.linearRampToValueAtTime(600, ctx.currentTime + 0.45);
          gain.gain.setValueAtTime(0.2, ctx.currentTime); gain.gain.linearRampToValueAtTime(0, ctx.currentTime + 0.6);
          osc.connect(gain); gain.connect(ctx.destination);
          osc.start(); osc.stop(ctx.currentTime + 0.6);
        } else if (type === 'heal') {
          const osc = ctx.createOscillator(); const gain = ctx.createGain();
          osc.type = 'sine'; osc.frequency.setValueAtTime(400, ctx.currentTime);
          osc.frequency.exponentialRampToValueAtTime(1200, ctx.currentTime + 0.4);
          gain.gain.setValueAtTime(0.2, ctx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.4);
          osc.connect(gain); gain.connect(ctx.destination);
          osc.start(); osc.stop(ctx.currentTime + 0.4);
        } else if (type === 'dice') {
          const osc = ctx.createOscillator(); const gain = ctx.createGain();
          osc.type = 'triangle'; osc.frequency.setValueAtTime(800, ctx.currentTime);
          osc.frequency.exponentialRampToValueAtTime(200, ctx.currentTime + 0.05);
          gain.gain.setValueAtTime(0.1, ctx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.05);
          osc.connect(gain); gain.connect(ctx.destination);
          osc.start(); osc.stop(ctx.currentTime + 0.05);
        }
      } catch (e) { console.log("Audio not supported or disabled"); }
    };

    // --- SVG 圖像庫 ---
    const Icons = {
      Paladin: (color) => `<svg viewBox="0 0 24 24" fill="none" class="w-full h-full" style="filter: drop-shadow(0 0 10px ${color}80)"><path d="M12 2L4 5V11C4 16.1 7.4 20.9 12 22C16.6 20.9 20 16.1 20 11V5L12 2Z" fill="${color}40" stroke="${color}" stroke-width="1.5"/><path d="M12 6V18M8 10H16" stroke="#ffffff" stroke-width="2" stroke-linecap="round"><animate attributeName="stroke-opacity" values="0.4;1;0.4" dur="2s" repeatCount="indefinite" /></path><circle cx="12" cy="12" r="8" stroke="${color}" stroke-width="1" stroke-dasharray="2 3" class="animate-spin-slow" /></svg>`,
      Mage: (color) => `<svg viewBox="0 0 24 24" fill="none" class="w-full h-full" style="filter: drop-shadow(0 0 12px ${color}90)"><circle cx="12" cy="12" r="7" fill="${color}30" stroke="${color}" stroke-width="1.5" /><circle cx="12" cy="12" r="4" fill="#ffffff"><animate attributeName="r" values="3;5;3" dur="2s" repeatCount="indefinite" /></circle>${[0, 72, 144, 216, 288].map((deg, i) => `<circle cx="12" cy="12" r="1.5" fill="${color}" transform="rotate(${deg} 12 12) translate(0 -9)"><animate attributeName="opacity" values="0;1;0" dur="${1 + i*0.2}s" repeatCount="indefinite" /></circle>`).join('')}</svg>`,
      Archer: (color) => `<svg viewBox="0 0 24 24" fill="none" class="w-full h-full" style="filter: drop-shadow(0 0 10px ${color}80)"><path d="M6 3C6 3 18 3 18 12C18 21 6 21 6 21" stroke="${color}" stroke-width="2" stroke-linecap="round" /><path d="M18 12H4M18 12L14 8M18 12L14 16" stroke="#ffffff" stroke-width="2" stroke-linecap="round" /></svg>`,
      Assassin: (color) => `<svg viewBox="0 0 24 24" fill="none" class="w-full h-full" style="filter: drop-shadow(0 0 12px ${color}80)"><path d="M17.5 6.5L12 12L6.5 17.5" stroke="${color}" stroke-width="3" stroke-linecap="round" /><path d="M19 5L5 19" stroke="white" stroke-width="1" opacity="0.3" /><path d="M12 12L14 10M12 12L10 14" stroke="#ffffff" stroke-width="3" stroke-linecap="round"><animate attributeName="stroke-opacity" values="1;0.2;1" dur="1.5s" repeatCount="indefinite" /></path></svg>`,
      Priest: (color) => `<svg viewBox="0 0 24 24" fill="none" class="w-full h-full" style="filter: drop-shadow(0 0 12px ${color}80)"><path d="M12 4V20M4 12H20" stroke="${color}" stroke-width="3" stroke-linecap="round" /><path d="M12 2L22 12L12 22L2 12L12 2Z" stroke="#ffffff" stroke-width="1.5" stroke-dasharray="3 3" class="animate-pulse" /></svg>`,
      Party: () => `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="w-5 h-5"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path><polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline><line x1="12" y1="22.08" x2="12" y2="12"></line></svg>`,
      Dice: () => `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-4 h-4 mr-1 inline"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5" fill="currentColor"></circle><circle cx="15.5" cy="15.5" r="1.5" fill="currentColor"></circle></svg>`
    };

    const Silhouette = (type) => {
      let iconHTML = '';
      if(type === "聖騎士") iconHTML = Icons.Paladin('#ffffff');
      else if(type === "大法師") iconHTML = Icons.Mage('#ffffff');
      else if(type === "神射手") iconHTML = Icons.Archer('#ffffff');
      else if(type === "刺客") iconHTML = Icons.Assassin('#ffffff');
      else if(type === "牧師") iconHTML = Icons.Priest('#ffffff');
      return `<div class="absolute right-0 bottom-0 opacity-[0.04] pointer-events-none translate-x-2 translate-y-2 scale-[1.7] w-28 h-28">${iconHTML}</div>`;
    };

    // --- 常數資料 ---
    const PROFESSION_DATA = [
      { id: 0, class: "聖騎士", componentName: "Paladin", color: "#f43f5e", avatar: "https://api.dicebear.com/9.x/notionists/svg?seed=Felix&backgroundColor=f43f5e", baseAbility: "【守護】當魔王發動「掠奪」企圖扣分時，有 {x}% 機率展開聖盾，完美保護全班免受懲罰。", shortAbility: "抵禦魔王扣分 {x}%" },
      { id: 1, class: "大法師", componentName: "Mage", color: "#0ea5e9", avatar: "https://api.dicebear.com/9.x/notionists/svg?seed=Aneka&backgroundColor=0ea5e9", baseAbility: "【爆擊】每次攻擊魔王時，有 35% 機率觸發奧能湧動，額外造成 {x} 點傷害並獲得同等積分。", shortAbility: "35%機率 額外+{x}傷/分" },
      { id: 2, class: "神射手", componentName: "Archer", color: "#10b981", avatar: "https://api.dicebear.com/9.x/notionists/svg?seed=Jack&backgroundColor=10b981", baseAbility: "【精準】每次攻擊魔王時，有 40% 機率「無視魔王格擋」，並額外削弱其 {x} 點 HP。", shortAbility: "40%機率 無視格擋額外+{x}傷" },
      { id: 3, class: "刺客", componentName: "Assassin", color: "#a855f7", avatar: "https://api.dicebear.com/9.x/notionists/svg?seed=Shadow&backgroundColor=a855f7", baseAbility: "【掠奪】每次攻擊魔王時，有 30% 機率造成 1.5 倍暴擊傷害，並從魔王金庫中偷取 {x} 分給自己。", shortAbility: "30%機率 1.5倍暴擊並偷取{x}分" },
      { id: 4, class: "牧師", componentName: "Priest", color: "#f59e0b", avatar: "https://api.dicebear.com/9.x/notionists/svg?seed=Jude&backgroundColor=f59e0b", baseAbility: "【神蹟】每次攻擊魔王時，有 40% 機率引導聖光，讓全班每一組（包含自己）同時額外獲得 {x} 分。", shortAbility: "40%機率 全班(含自己) +{x}分" }
    ];

    const BOSS_SKILLS = [
      { name: '無禮魔王', emoji: '🤬', avatar: 'https://image.pollinations.ai/prompt/Evil%20Cyberpunk%20KPOP%20boy%20band%20member%20angry%20neon%20blue%20lighting?width=256&height=256&nologo=true', color: '#94a3b8', desc: '【格擋】被攻擊時，有 50% 機率不屑地格擋勇士們附加的職業技能。', shortDesc: '50% 機率格擋英雄技能' },
      { name: '自私魔王', emoji: '👿', avatar: 'https://image.pollinations.ai/prompt/Evil%20Cyberpunk%20KPOP%20girl%20group%20leader%20arrogant%20neon%20purple%20lighting?width=256&height=256&nologo=true', color: '#c084fc', desc: '【掠奪】被攻擊時，有 40% 機率釋放威壓，將全班積分扣除 10% (可被聖盾抵擋)。', shortDesc: '40% 機率全班扣分 10%' },
      { name: '傲慢魔王', emoji: '😤', avatar: 'https://image.pollinations.ai/prompt/Evil%20Visual%20Kei%20KPOP%20idol%20smirk%20neon%20orange%20lighting?width=256&height=256&nologo=true', color: '#fb923c', desc: '【再生】被攻擊時，有 45% 機率為目前血量最低的存活魔王恢復 200 點 HP。', shortDesc: '45% 機率治癒殘血 200HP' }
    ];

    const QUEST_LIST = ["科任課沒有被記", "全班不說髒話", "全班都抄筆記", "排隊很整齊", "午休全班檢查通過", "整潔比賽全班過"];

    const INITIAL_BOSSES = [
      { id: 0, name: '無禮魔王', hp: 1000, maxHp: 1000, emoji: '🤬' },
      { id: 1, name: '自私魔王', hp: 1000, maxHp: 1000, emoji: '👿' },
      { id: 2, name: '傲慢魔王', hp: 1000, maxHp: 1000, emoji: '😤' }
    ];
    
    const LEVEL_THRESHOLD = 100;

    // --- 全域狀態 (Global State) ---
    let state = {
      scores: [0, 0, 0, 0, 0],
      combos: [0, 0, 0, 0, 0],
      bosses: JSON.parse(JSON.stringify(INITIAL_BOSSES)),
      log: ["系統啟動..."],
      teamNames: ["", "", "", "", ""],
      classOnFire: false,
      bossesOnFire: false,
      currentQuest: null,
      questStatus: 'none',
      customAvatars: {},
      rewardText: "畢業同樂會"
    };

    let inputScores = ["0", "0", "0", "0", "0"];
    let prevScores = [0, 0, 0, 0, 0];
    let configBossHp = ["1000", "1000", "1000"];
    let configRewardText = "畢業同樂會";
    
    let activeTab = 'battle';
    let skillTab = 'heroes';
    let slotRolling = false;
    let displayQuest = "等待抽取...";
    let bgmPlaying = false;
    let resetConfirm = false;
    let diceTarget = null;
    let studioTargetType = 'hero';
    let studioTargetId = 0;
    let studioPromptText = '';
    let studioPreviewUrl = null;
    let studioIsGenerating = false;

    // 用來動態記憶與更新當前骰子點數的變數
    let currentDice1 = 6;
    let currentDice2 = 6;

    let levelUpIndices = [];

    // --- 全域暴露更新函式，供行內事件呼叫 ---
    window.updateInputScore = (idx, value) => { inputScores[idx] = value; };
    window.updateConfigReward = (val) => { configRewardText = val; };

    const getHeroAvatar = (idx) => state.customAvatars?.[`hero_${idx}`] || PROFESSION_DATA[idx].avatar;
    const getBossAvatar = (idx) => state.customAvatars?.[`boss_${idx}`] || BOSS_SKILLS[idx].avatar;
    const getSkillValue = (idx, lv) => {
      const p = PROFESSION_DATA[idx].class;
      if (p === "聖騎士") return Math.min(80, 30 + lv * 5); 
      if (p === "大法師") return 30 + lv * 10;            
      if (p === "神射手") return 20 + lv * 8;             
      if (p === "刺客") return 15 + lv * 5;               
      if (p === "牧師") return 10 + lv * 4;               
      return 0;
    };

    const TABS = [
      { id: 'battle', label: '⚔️ 戰鬥核心' },
      { id: 'skills', label: '📖 技能圖鑑' },
      { id: 'quests', label: '🎯 懸賞任務' },
      { id: 'log', label: '📜 戰鬥日誌' },
      { id: 'leaderboard', label: '🏆 榮譽榜' },
      { id: 'studio', label: '🎨 視覺工坊' }
    ];

    // --- Firebase Init ---
    const firebaseConfigStr = typeof __firebase_config !== 'undefined' ? __firebase_config : '{}';
    const appId = typeof __app_id !== 'undefined' ? __app_id : 'odyssey-quest-v15-vanilla';
    let db, docRef, isFirebaseReady = false;

    try {
      const app = initializeApp(JSON.parse(firebaseConfigStr));
      const auth = getAuth(app);
      db = getFirestore(app);
      docRef = doc(db, 'artifacts', appId, 'public', 'data', 'gameSession', 'mainState');
      
      const initAuth = async () => {
        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
          await signInWithCustomToken(auth, __initial_auth_token);
        } else {
          await signInAnonymously(auth);
        }
      };
      
      initAuth();
      onAuthStateChanged(auth, (user) => {
        if (user) {
          isFirebaseReady = true;
          onSnapshot(docRef, (snap) => {
            if (snap.exists()) {
              const data = snap.data();
              state = {
                ...state,
                scores: data.scores || state.scores,
                combos: data.combos || state.combos,
                bosses: data.bosses || state.bosses,
                log: data.log || state.log,
                teamNames: data.teamNames || state.teamNames,
                classOnFire: data.classOnFire || false,
                bossesOnFire: data.bossesOnFire || false,
                currentQuest: data.currentQuest || null,
                questStatus: data.questStatus || 'none',
                customAvatars: data.customAvatars || {},
                rewardText: data.rewardText || "畢業同樂會"
              };
              
              configRewardText = state.rewardText;
              checkLevelUp(data.scores || state.scores);
              prevScores = data.scores || state.scores;
              inputScores = (data.scores || state.scores).map(String);
              renderAll();
            } else {
              setDoc(docRef, state);
            }
          });
        }
      });
    } catch(e) {
      console.error("Firebase init failed", e);
      setTimeout(renderAll, 100);
    }

    const updateCloud = async (newData) => {
      Object.assign(state, newData);

    const writeLog = (msg, currentLog) => {

      return [`[${time}] ${msg}`, ...currentLog].slice(0, 50); 
    };

    function checkLevelUp(newScores) {
      const newLeveledUp = [];
      newScores.forEach((s, i) => {
        const oldLv = Math.floor(Number(prevScores[i]) / LEVEL_THRESHOLD) + 1;
        const newLv = Math.floor(Number(s) / LEVEL_THRESHOLD) + 1;
        if (newLv > oldLv) {
          newLeveledUp.push(i);
        }
      });
      if (newLeveledUp.length > 0) {
        window.playSFX('levelup');
        levelUpIndices.push(...newLeveledUp);
        renderBattle();
        setTimeout(() => {
           levelUpIndices = levelUpIndices.filter(id => !newLeveledUp.includes(id));
           renderBattle();
        }, 2500);
      }
    }

    window.handleBgmUpload = (event) => {
      const file = event.target.files[0];
      if (!file) return;
      
      // 停止並清除原先的合成器計時器
      clearTimeout(window.proceduralBgmTimer);
      
      const url = URL.createObjectURL(file);
      const audio = document.getElementById('bgmAudio');
      audio.src = url;
      bgmPlaying = true;
      audio.volume = 0.4;
      audio.play().catch(e => {
         console.log(e);
         bgmPlaying = false;
         alert("播放失敗，請確認檔案格式是否正確。");
      });
      updateBGMUI();
    };

    // 內建備用 AI 電子合成音效器 (Web Audio API)
    window.createSynth = (freq, type, startTime, duration, vol = 0.2) => {
      if (!window.audioCtx) return;
      const osc = window.audioCtx.createOscillator();
      const gain = window.audioCtx.createGain();
      osc.type = type;
      osc.frequency.setValueAtTime(freq, startTime);
      gain.gain.setValueAtTime(vol, startTime);
      gain.gain.exponentialRampToValueAtTime(0.001, startTime + duration);
      osc.connect(gain);
      gain.connect(window.audioCtx.destination);
      osc.start(startTime);
      osc.stop(startTime + duration);
    };

    window.proceduralBgmTimer = null;
    window.bgmStep = 0;
    window.startProceduralBGM = () => {
        if (!bgmPlaying) return;
        const now = window.audioCtx.currentTime;
        
        // Doom Bass
        if (window.bgmStep % 8 === 0) window.createSynth(65.41, 'sawtooth', now, 1.5, 0.3); // C2
        else if (window.bgmStep % 8 === 4) window.createSynth(73.42, 'sawtooth', now, 1.5, 0.3); // D2
        
        // Heartbeat Kick
        if (window.bgmStep % 4 === 0 || window.bgmStep % 4 === 3) window.createSynth(50, 'sine', now, 0.3, 0.8); 
        
        // High Synth
        if (window.bgmStep % 16 === 0) { window.createSynth(261.63, 'triangle', now, 2.0, 0.1); }
        else if (window.bgmStep % 16 === 8) { window.createSynth(293.66, 'triangle', now, 2.0, 0.1); }
        
        window.bgmStep++;
        window.proceduralBgmTimer = setTimeout(window.startProceduralBGM, 250);
    };

    window.toggleBGM = () => {
      bgmPlaying = !bgmPlaying;
      const audio = document.getElementById('bgmAudio');
      audio.volume = 0.4;
      
      if(bgmPlaying) {
        // Init AudioContext first on user interaction
        if (!window.audioCtx) window.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (window.audioCtx.state === 'suspended') window.audioCtx.resume();

        // 檢查是否上傳了本地檔案
        if (audio.src && audio.src.startsWith('blob:')) {
            audio.play().catch(e => {
               console.log(e); bgmPlaying = false; updateBGMUI();
            });
        } else {
            // 嘗試播放預設 MP3，若失敗則使用內建程式運算合成器
            audio.play().catch(e => {
                console.log("MP3 Audio play failed (CORS/Local file). Switching to Procedural Web Audio:", e);
                window.bgmStep = 0;
                startProceduralBGM();
            });
        }
      } else {
        audio.pause();
        clearTimeout(window.proceduralBgmTimer);
      }
      updateBGMUI();
    };

        btnText.innerText = "🔊 BGM ON";

      }

    // --- 動態懸浮特效函式 ---
    function spawnFloatingVFX(targetElementId, htmlContent, offsetX = 0, offsetY = 0, alignCenter = true) {
      const target = document.getElementById(targetElementId);
      if (!target) return;
      
      const rect = target.getBoundingClientRect();
      const el = document.createElement('div');
      
      el.className = "fixed flex justify-center z-[150] pointer-events-none animate-float-up";
      el.style.left = `${rect.left}px`;
      el.style.width = `${rect.width}px`;
      
      if (alignCenter) {
        el.style.top = `${rect.top + (rect.height / 2) + offsetY}px`;
      } else {
        el.style.top = `${rect.top + offsetY}px`;
      }
      
      el.innerHTML = htmlContent;
      document.body.appendChild(el);
      
      setTimeout(() => { if (document.body.contains(el)) el.remove(); }, 1200);
    }

    // --- 核心戰鬥邏輯 ---
    window.syncScore = async (idx) => {
      const oldScore = Number(state.scores[idx]);
      const newVal = parseInt(document.getElementById(`inputScore-${idx}`).value);
      if (isNaN(newVal)) return;
      let delta = newVal - oldScore;
      if (delta === 0) return;

      let newScores = [...state.scores].map(Number);
      let newCombos = [...state.combos];
      let newLog = [...state.log];
      let newBosses = JSON.parse(JSON.stringify(state.bosses)); 
      let actualDelta = delta;
      
      const pName = PROFESSION_DATA[idx].class;
      let newHeroVfx = {};
      
      if (delta > 0 && state.classOnFire) {
        actualDelta = Math.floor(delta * 1.2);
        newLog = writeLog(`🔥 【ON FIRE】${pName} 狀態火熱！獲得 1.2 倍爆發加成 (+${actualDelta})`, newLog);
      }

      let finalScore = oldScore + actualDelta;
      let damage = actualDelta; 

      if (actualDelta < 0) {
        newScores[idx] = Math.max(0, finalScore);
        await updateCloud({ scores: newScores, log: newLog });
        return;
      }

      const oldLv = Math.floor(oldScore / LEVEL_THRESHOLD) + 1;
      const sVal = getSkillValue(idx, oldLv); 
      const aliveBosses = newBosses.filter(b => b.hp > 0);
      
      let isSelfish = false;

      if (aliveBosses.length > 0) {
        const targetBoss = aliveBosses[Math.floor(Math.random() * aliveBosses.length)];
        const targetBossId = targetBoss.id;
        const bossIndex = newBosses.findIndex(b => b.id === targetBoss.id);

        const bossBuff = state.bossesOnFire ? 0.15 : 0;
        let isSkillBlocked = targetBoss.name === '無禮魔王' && Math.random() < (0.50 + bossBuff);
        let isSelfishTriggered = targetBoss.name === '自私魔王' && Math.random() < (0.40 + bossBuff);
        let isHealTriggered = targetBoss.name === '傲慢魔王' && Math.random() < (0.45 + bossBuff);
        let healTargetIdx = -1;

        if (pName === "神射手" && Math.random() < 0.40) {
          isSkillBlocked = false; 
          damage += sVal;
          showHeroVFX(idx, "🎯 精準破甲！");
          newLog = writeLog(`🏹 【精準】神射手無視格擋！對 ${newBosses[bossIndex].name} 造成額外 ${sVal} 點傷害！`, newLog);
        }

        if (!isSkillBlocked) {
          if (pName === "大法師" && Math.random() < 0.35) {
            finalScore += sVal; damage += sVal; showHeroVFX(idx, "🔮 奧能爆擊！");
            newLog = writeLog(`🔮 【爆擊】大法師奧能爆發！額外造成 ${sVal} 傷害並獲得 ${sVal} 分！`, newLog);
          }
          else if (pName === "刺客" && Math.random() < 0.30) {
            damage = Math.floor(damage * 1.5); finalScore += sVal; showHeroVFX(idx, "🗡️ 致命掠奪！");
            newLog = writeLog(`🗡️ 【掠奪】刺客打出 1.5 倍致命傷！並從魔王身上偷取 ${sVal} 分！`, newLog);
          }
          else if (pName === "牧師" && Math.random() < 0.40) {
            finalScore += sVal; newScores = newScores.map((s, i) => i === idx ? s : s + sVal);
            showHeroVFX(idx, "✨ 神蹟降臨！");
            newLog = writeLog(`✨ 【神蹟】牧師祈禱！全班各組（含自己）同時獲得 +${sVal} 分輔助！`, newLog);
          }
        } else if (targetBoss.name === '無禮魔王') {
          newLog = writeLog(`🛡️ 【格擋】無禮魔王不屑地揮手，抵擋了本次的附加職業技能！`, newLog);
        }

        newScores[idx] = finalScore;
        newBosses[bossIndex].hp = Math.max(0, newBosses[bossIndex].hp - damage);
        if (damage > 0) window.playSFX('hit'); 
        newLog = writeLog(`💥 ${pName} 對 ${newBosses[bossIndex].name} 造成了 ${damage} 點基本/技能傷害！`, newLog);

        let paladinBlocked = false;
        if (isSelfishTriggered && newBosses[bossIndex].hp > 0) { 
          const pIdx = PROFESSION_DATA.findIndex(p => p.class === "聖騎士");
          const pLv = Math.floor(Number(state.scores[pIdx]) / LEVEL_THRESHOLD) + 1;
          const pSkill = getSkillValue(pIdx, pLv);

          if (Math.random() * 100 < pSkill) {
            paladinBlocked = true;
            showHeroVFX(pIdx, "🛡️ 聖盾保護！");
            newLog = writeLog(`🛡️ 【聖盾】自私魔王發動掠奪，被聖騎士 the 護盾完美擋下！`, newLog);
          } else {
            newScores = newScores.map(s => Math.max(0, Math.floor(s * 0.90))); 
            window.playSFX('alert'); 
            isSelfish = true;
            newLog = writeLog(`⚠️ 【掠奪】自私魔王釋放威壓，全班積分慘遭降低 10%！`, newLog);
          }
        }

        if (isHealTriggered && newBosses[bossIndex].hp > 0) {
          const aliveForHeal = newBosses.filter(b => b.hp > 0);
          if (aliveForHeal.length > 0) {
            aliveForHeal.sort((a, b) => a.hp - b.hp);
            healTargetIdx = newBosses.findIndex(b => b.id === aliveForHeal[0].id);
            const healAmt = 200; 
            newBosses[healTargetIdx].hp = Math.min(newBosses[healTargetIdx].maxHp, newBosses[healTargetIdx].hp + healAmt);
            window.playSFX('heal'); 
            
            spawnFloatingVFX(
              `boss-card-${newBosses[healTargetIdx].id}`,
              `<span class="text-cyan-300 font-black text-3xl" style="text-shadow: 0 2px 15px rgba(34,211,238,0.8)">+200 HP</span>`,
              0, 15, false
            );
            newLog = writeLog(`💚 【再生】傲慢魔王發動治療，為 ${newBosses[healTargetIdx].name} 恢復了 ${healAmt} HP！`, newLog);
          }
        }

        if (newBosses[bossIndex].hp === 0) {
          newLog = writeLog(`💀 捷報！${newBosses[bossIndex].name} 已被徹底擊潰！`, newLog);
        }

        if (isSkillBlocked) { showBossSkillText(targetBossId, "🛡️ 完美格擋！"); } 
        else if (isSelfishTriggered && newBosses[bossIndex].hp > 0 && !paladinBlocked) { showBossSkillText(targetBossId, "👿 威壓掠奪！"); } 
        else if (isHealTriggered && healTargetIdx !== -1) { showBossSkillText(targetBossId, "💚 傲慢再生！"); }

        showBossDamageVFX(targetBossId, isSkillBlocked ? "🛡️ 格擋!" : `-${damage}`, isSkillBlocked);

      } else {
        newScores[idx] = finalScore;
      }

      const allDefeated = newBosses.every(b => b.hp === 0);
      const wasDefeated = state.bosses.every(b => b.hp === 0);
      if (allDefeated && !wasDefeated) {
        newLog = writeLog(`👑 🎊 三大魔王全數討伐成功！全班解鎖【${state.rewardText}】！ 🎊`, newLog);
      }

      if(isSelfish) {
        const overlay = document.getElementById('selfishOverlay');
        overlay.classList.add('bg-fuchsia-900/30');
        setTimeout(() => overlay.classList.remove('bg-fuchsia-900/30'), 500);
      }

      await updateCloud({ scores: newScores, combos: newCombos, bosses: newBosses, log: newLog });
    };

    // --- 各個 View 的渲染器 ---
    function renderBattle() {
      const view = document.getElementById('view-battle');
      if (view.classList.contains('hidden')) return;

      const isVictorious = state.bosses.every(b => b.hp === 0);

         statusHTML += `<div class="flex-1 bg-gradient-to-r from-red-600/80 to-orange-500/80 text-white font-black text-center py-2 px-4 rounded-xl shadow-[0_0_15px_rgba(239,68,68,0.6)] animate-pulse border border-red-400 text-sm md:text-base">🔥 全班 ON FIRE 狀態中：所有攻擊與加分 1.2 倍加成！</div>`;

        return `
          <div id="boss-card-${boss.id}" class="border-2 rounded-3xl p-4 flex flex-col justify-center items-center relative overflow-hidden transition-colors duration-300 ${vfxClass} backdrop-blur-md">

              <img src="${getBossAvatar(boss.id)}" class="w-full h-full object-cover" />

            </div>
          </div>
        `;
      }).join('');

      let sortedIdx = [0,1,2,3,4].sort((a,b) => Number(state.scores[b]) - Number(state.scores[a]));
      
      let heroesHTML = sortedIdx.map((idx, rank) => {
        const prof = PROFESSION_DATA[idx];
        const score = Number(state.scores[idx]);
        const lv = Math.floor(score / LEVEL_THRESHOLD) + 1;
        const isVIP = rank === 0 && score > 0;
        const teamName = state.teamNames[idx] || "";
        const isOnFire = state.classOnFire;
        const isLevelingUp = levelUpIndices.includes(idx);
        
        const cardClass = isLevelingUp 
          ? 'bg-white/10 z-30 scale-[1.03] shadow-[0_0_30px_rgba(255,255,255,0.4)]' 
          : (isVIP ? 'bg-gradient-to-b from-yellow-300/20 via-amber-500/10 to-orange-600/30 border-yellow-400/60 z-10 shadow-[0_0_25px_rgba(250,204,21,0.25)] ring-1 ring-yellow-300/30' : 'bg-slate-900/40 border-white/10 opacity-95 shadow-[0_4px_15px_rgba(0,0,0,0.3)] ring-1 ring-white/5');

    // --- 懸賞任務 View ---
    window.drawQuest = () => {
      slotRolling = true; renderQuests();
      let ticks = 0;
      const interval = setInterval(() => {
        window.playSFX('dice');
        displayQuest = QUEST_LIST[Math.floor(Math.random() * QUEST_LIST.length)];
        renderQuests();
        ticks++;
        if (ticks > 20) {
          clearInterval(interval);
          slotRolling = false;
          const finalQuest = QUEST_LIST[Math.floor(Math.random() * QUEST_LIST.length)];
          displayQuest = finalQuest;
          window.playSFX('levelup');
          updateCloud({ currentQuest: finalQuest, questStatus: 'pending', log: writeLog(`🎯 抽出本週懸賞任務：「${finalQuest}」！`, state.log) });
        }
      }, 100);
    };

    window.resolveQuest = async (isSuccess) => {
      const newLog = writeLog(isSuccess ? `🔥 懸賞任務成功！全班進入 ON FIRE 狀態！` : `⚠️ 懸賞任務失敗！三大魔王已狂暴化！`, state.log);
      if(isSuccess) window.playSFX('levelup'); else window.playSFX('alert');
      await updateCloud({ questStatus: isSuccess ? 'success' : 'fail', classOnFire: isSuccess, bossesOnFire: !isSuccess, log: newLog });
    };

    window.resetQuest = () => updateCloud({ currentQuest: null, questStatus: 'none', classOnFire: false, bossesOnFire: false });

      const view = document.getElementById('view-quests');

        btnHtml = `<button onclick="drawQuest()" ${slotRolling?'disabled':''} class="bg-gradient-to-r from-blue-500 to-cyan-500 text-white font-black text-xl px-8 py-4 rounded-2xl hover:scale-105 active:scale-95 transition-all shadow-[0_0_20px_rgba(6,182,212,0.5)]">🎲 ${slotRolling ? '抽取中...' : '抽取本週懸賞'}</button>`;

          clearInterval(interval);

          window.playSFX('levelup');
          
          // ✅ 計算正確的判定結果，並將此時的點數一併帶入最終渲染
          const finalResult = diceTarget.rank === 0 ? Math.max(currentDice1, currentDice2) : currentDice1;

      // 復原 Focus 狀態
      if (activeId) {
        const el = document.getElementById(activeId);
        if (el) {
          el.focus();
          try {
            if (selectionStart !== null && selectionEnd !== null) {
              el.setSelectionRange(selectionStart, selectionEnd);
            }
          }catch(e){}
        }
      }
    }
  </script>
</body>
</html>
